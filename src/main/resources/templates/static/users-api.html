<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products API Fetch</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

<div class="container py-4">

    <h1 class="mb-4">Users (REST + fetch)</h1>

    <div class="card p-3 mb-4">
        <h5 id="formTitle">Add user</h5>

        <form id="userForm">
            <input type="hidden" id="userId">

            <div class="mb-2">
                <input name="firstName"
                       id="firstName"
                       class="form-control"
                       placeholder="First Name"
                       required>
            </div>

            <div class="mb-2">
                <input name="lastName"
                       id="lastName"
                       class="form-control"
                       placeholder="Last Name"
                       required>
            </div>

            <div class="mb-2">
                <input name="email"
                       id="email"
                       type="email"
                       class="form-control"
                       placeholder="Email"
                       required>
            </div>

            <div class="mb-2">
                <input name="username"
                       id="username"
                       class="form-control"
                       placeholder="Username"
                       required>
            </div>

            <div class="mb-2">
                <input name="password"
                       type="password"
                       id="password"
                       class="form-control"
                       placeholder="Password"
                       required>
            </div>

            <div class="mb-3 text-center">
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" name="roleIds" value="1" id="role-admin">
                    <label class="form-check-label" for="role-admin">Admin</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" name="roleIds" value="2" id="role-user">
                    <label class="form-check-label" for="role-user">User</label>
                </div>
            </div>

            <button class="btn btn-primary" id="saveBtn">
                Save
            </button>
        </form>
    </div>

    <h5>User list</h5>
    <ul id="user-list" class="list-group"></ul>
</div>




<script>
    async function loadUsers() {
        const response = await fetch('api/users');
        const users = await response.json();

        const list = document.getElementById('user-list');
        list.innerHTML = '';

        for (const u of users) {
            const li = document.createElement('li');
            li.className = 'list-group-item d-flex justify-content-between align-items-center'

            list.innerHTML = `
            <span>
                <strong>${u.name}</strong>
                (${u.role}) - ${u.username}
            </span>
        <div>
            <button class="btn btn-sm btn-outline-secondary me-2"
                    onclick="editUser(${u.id}, '${p.firstName}', '${u.lastName}', '${u.username}', ${u.email}">
                Edit
            </button>
            <button class="btn btn-sm btn-outline-danger"
                    onclick="deleteUser(${u.id})">
                Delete
            </button>
        </div>
    `;

            list.appendChild(li);
        }
    }

    document.getElementById('userForm')
        .addEventListener('submit', async (e) => {
            e.preventDefault();

            const id = document.getElementById('userId').value;

            const user = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                role: document.getElementById('role').value
            };

            if (id) {
                await fetch(`api/users/${id}}`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(user)
                });
            } else {
                await fetch(`api/users`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(user)
                });
            }

            resetFrom();
            await loadProducts();
        });

    function editUser(firstName, lastName, email, username, password, role) {
        document.getElementById('firstName').value = firstName;
        document.getElementById('lastName').value = lastName;
        document.getElementById('email').value = email;
        document.getElementById('username').value = username;
        document.getElementById('password').value = password;
        document.getElementById('role').value = role;

        document.getElementById('formTitle').innerText = 'Edit user';
        document.getElementById('saveBtn').innerText = 'Update';
    }


        async function deleteUser(id) {
            await fetch(`api/users/${id}`, {
                method: 'DELETE'
            });
            await loadUsers();
        }

        function resetForm() {
            document.getElementById('userId').value = '';
            document.getElementById('userForm').reset();
            document.getElementById('formTitle').innerText = 'Add user';
            document.getElementById('saveBtn').innerText = 'Save';
        }

        loadUsers();
</script>
</body>
</html>
