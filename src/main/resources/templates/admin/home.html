<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid">
    <div class="row">

        <div class="col-md-3 col-lg-2 p-0">
            <div th:replace="~{fragments/sidebar :: sidebar('admin')}"></div>
        </div>

        <div class="col-md-9 col-lg-10 p-4">
            <h1 class="mb-3">Admin panel</h1>

            <ul class="nav nav-tabs mb-3" id="adminTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link"
                            th:classappend="${activeTab}=='users' ? ' active' : ''"
                            id="users-tab"
                            data-bs-toggle="tab"
                            data-bs-target="#usersTab"
                            type="button">
                        Users
                    </button>
                </li>

                <li class="nav-item" role="presentation">
                    <button class="nav-link"
                            th:classappend="${activeTab}=='newUser' ? ' active' : ''"
                            id="newuser-tab"
                            data-bs-toggle="tab"
                            data-bs-target="#newUserTab"
                            type="button">
                        New User
                    </button>
                </li>
            </ul>

            <div class="tab-content" id="adminTabsContent">

                <div class="tab-pane fade"
                     th:classappend="${activeTab}=='users' ? ' show active' : ''"
                     id="usersTab">
                    <div th:replace="~{fragments/user-table :: userTable(${users}, true)}"></div>
                </div>

                <div class="tab-pane fade"
                     th:classappend="${activeTab}=='newUser' ? ' show active' : ''"
                     id="newUserTab">
                    <div th:replace="~{fragments/user-form :: userForm(${user}, ${roles})}"></div>
                </div>

            </div>
        </div>

    </div>
</div>


<div th:replace="~{fragments/editModal :: editModal}"></div>
<div th:replace="~{fragments/deleteModal :: deleteModal}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // REST API base URL
    const API_BASE_URL = '/api/users';

    // Helper function for API calls
    async function apiCall(url, method, data = null) {
        const options = {
            method: method,
            headers: {
                'Content-Type': 'application/json',
            }
        };

        if (data) {
            options.body = JSON.stringify(data);
        }

        try {
            const response = await fetch(url, options);

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(errorText || `HTTP error! status: ${response.status}`);
            }

            if (method === 'DELETE' || response.status === 204) {
                return null;
            }

            return await response.json();
        } catch (error) {
            console.error('API call failed:', error);
            throw error;
        }
    }

    // Load all users
    async function loadUsers() {
        try {
            const users = await apiCall(API_BASE_URL, 'GET');
            updateUserTable(users);
        } catch (error) {
            console.error('Failed to load users:', error);
            showError('Failed to load users', error);
        }
    }

    // Update user table with data
    function updateUserTable(users) {
        const tableBody = document.querySelector('#usersTab table tbody');
        if (!tableBody) return;

        tableBody.innerHTML = '';

        users.forEach(user => {
            const row = tableBody.insertRow();

            row.insertCell(0).textContent = user.id;
            row.insertCell(1).textContent = user.firstName || '';
            row.insertCell(2).textContent = user.lastName || '';
            row.insertCell(3).textContent = user.email || '';
            row.insertCell(4).textContent = user.username;

            // Roles cell
            const rolesCell = row.insertCell(5);
            const rolesText = user.roles ? user.roles.map(r => r.name || r.authority || r).join(', ') : '';
            rolesCell.textContent = rolesText;

            // Actions cell
            const actionsCell = row.insertCell(6);

            const editBtn = document.createElement('button');
            editBtn.textContent = 'Edit';
            editBtn.className = 'btn btn-sm btn-primary me-2';
            editBtn.setAttribute('data-bs-toggle', 'modal');
            editBtn.setAttribute('data-bs-target', '#editModal');
            editBtn.setAttribute('data-id', user.id);
            editBtn.setAttribute('data-firstname', user.firstName || '');
            editBtn.setAttribute('data-lastname', user.lastName || '');
            editBtn.setAttribute('data-email', user.email || '');
            editBtn.setAttribute('data-username', user.username);
            // Store role IDs as JSON string
            const roleIds = user.roles ? user.roles.map(r => r.id).join(',') : '';
            editBtn.setAttribute('data-roles', roleIds);

            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = 'Delete';
            deleteBtn.className = 'btn btn-sm btn-danger';
            deleteBtn.setAttribute('data-bs-toggle', 'modal');
            deleteBtn.setAttribute('data-bs-target', '#deleteModal');
            deleteBtn.setAttribute('data-id', user.id);
            deleteBtn.setAttribute('data-firstname', user.firstName || '');
            deleteBtn.setAttribute('data-lastname', user.lastName || '');
            deleteBtn.setAttribute('data-email', user.email || '');
            deleteBtn.setAttribute('data-username', user.username);
            deleteBtn.setAttribute('data-roles', rolesText);

            actionsCell.appendChild(editBtn);
            actionsCell.appendChild(deleteBtn);
        });
    }

    // Create new user
    async function createUser(userData, roleIds) {
        const url = `${API_BASE_URL}?${roleIds.map(id => `roleId=${id}`).join('&')}`;

        try {
            const newUser = await apiCall(url, 'POST', userData);
            showSuccess('User created successfully!');
            await loadUsers();
            return newUser;
        } catch (error) {
            console.error('Failed to create user:', error);
            throw error;
        }
    }

    // Update user
    async function updateUser(id, userData) {
        try {
            const updatedUser = await apiCall(`${API_BASE_URL}/${id}`, 'PUT', userData);
            showSuccess('User updated successfully!');
            await loadUsers();
            return updatedUser;
        } catch (error) {
            console.error('Failed to update user:', error);
            throw error;
        }
    }

    // Delete user
    async function deleteUser(id) {
        try {
            await apiCall(`${API_BASE_URL}/${id}`, 'DELETE');
            showSuccess('User deleted successfully!');
            await loadUsers();
        } catch (error) {
            console.error('Failed to delete user:', error);
            throw error;
        }
    }

    // Helper functions for UI feedback
    function showSuccess(message) {
        alert(message);
    }

    function showError(message, error) {
        alert(`${message}: ${error.message}`);
    }

    // Handle new user form submission
    document.addEventListener('DOMContentLoaded', () => {
        const userForm = document.getElementById('userForm');
        if (userForm) {
            userForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const firstName = document.getElementById('firstName').value;
                const lastName = document.getElementById('lastName').value;
                const email = document.getElementById('email').value;
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;

                if (!username || !password) {
                    alert('Username and password are required');
                    return;
                }

                const selectedRoles = [];
                document.querySelectorAll('input[name="roleIds"]:checked').forEach(checkbox => {
                    selectedRoles.push(checkbox.value);
                });

                if (selectedRoles.length === 0) {
                    alert('Please select at least one role');
                    return;
                }

                const userData = {
                    username: username,
                    firstName: firstName,
                    lastName: lastName,
                    email: email,
                    password: password
                };

                try {
                    await createUser(userData, selectedRoles);
                    userForm.reset();

                    // Switch to users tab
                    const usersTab = document.querySelector('#users-tab');
                    if (usersTab) {
                        const tab = new bootstrap.Tab(usersTab);
                        tab.show();
                    }
                } catch (error) {
                    alert(`Failed to create user: ${error.message}`);
                }
            });
        }
    });

    // Handle edit modal
    document.addEventListener('DOMContentLoaded', () => {
        const editModal = document.getElementById('editModal');
        if (editModal) {
            editModal.addEventListener('show.bs.modal', (event) => {
                const button = event.relatedTarget;
                if (!button) return;

                document.getElementById('edit-id').value = button.getAttribute('data-id') || '';
                document.getElementById('edit-firstName').value = button.getAttribute('data-firstname') || '';
                document.getElementById('edit-lastName').value = button.getAttribute('data-lastname') || '';
                document.getElementById('edit-email').value = button.getAttribute('data-email') || '';
                document.getElementById('edit-username').value = button.getAttribute('data-username') || '';
                document.getElementById('edit-password').value = '';

                // Set selected roles
                const editRolesSelect = document.getElementById('edit-roles');
                if (editRolesSelect) {
                    // Clear all selections
                    Array.from(editRolesSelect.options).forEach(opt => opt.selected = false);

                    const roleIds = button.getAttribute('data-roles') || '';
                    const selectedRoleIds = roleIds.split(',').map(id => id.trim()).filter(Boolean);

                    selectedRoleIds.forEach(roleId => {
                        const option = Array.from(editRolesSelect.options).find(opt => opt.value === roleId);
                        if (option) option.selected = true;
                    });
                }

                const errorDiv = document.getElementById('edit-roles-error');
                if (errorDiv) errorDiv.textContent = '';
            });

            const editForm = document.getElementById('editForm');
            if (editForm) {
                editForm.addEventListener('submit', async (e) => {
                    e.preventDefault();

                    const id = document.getElementById('edit-id').value;
                    const userData = {
                        username: document.getElementById('edit-username').value,
                        firstName: document.getElementById('edit-firstName').value,
                        lastName: document.getElementById('edit-lastName').value,
                        email: document.getElementById('edit-email').value
                    };

                    const password = document.getElementById('edit-password').value;
                    if (password && password.trim() !== '') {
                        userData.password = password;
                    }

                    const editRolesSelect = document.getElementById('edit-roles');
                    const selectedOptions = Array.from(editRolesSelect.selectedOptions);

                    if (selectedOptions.length === 0) {
                        const errorDiv = document.getElementById('edit-roles-error');
                        if (errorDiv) errorDiv.textContent = 'Please select at least one role';
                        return;
                    }

                    userData.roles = selectedOptions.map(opt => ({
                        id: parseInt(opt.value)
                    }));

                    try {
                        await updateUser(id, userData);
                        const modal = bootstrap.Modal.getInstance(editModal);
                        modal.hide();
                    } catch (error) {
                        alert(`Failed to update user: ${error.message}`);
                    }
                });
            }
        }
    });

    // Handle delete modal
    document.addEventListener('DOMContentLoaded', () => {
        const deleteModal = document.getElementById('deleteModal');
        if (deleteModal) {
            deleteModal.addEventListener('show.bs.modal', (event) => {
                const button = event.relatedTarget;
                if (!button) return;

                document.getElementById('delete-id').value = button.getAttribute('data-id') || '';
                document.getElementById('delete-firstName').value = button.getAttribute('data-firstname') || '';
                document.getElementById('delete-lastName').value = button.getAttribute('data-lastname') || '';
                document.getElementById('delete-email').value = button.getAttribute('data-email') || '';
                document.getElementById('delete-username').value = button.getAttribute('data-username') || '';

                const deleteRolesSelect = document.getElementById('delete-roles');
                if (deleteRolesSelect) {
                    deleteRolesSelect.innerHTML = '';
                    const rolesStr = button.getAttribute('data-roles') || '';
                    const roles = rolesStr.split(',').map(s => s.trim()).filter(Boolean);

                    roles.forEach(role => {
                        const option = document.createElement('option');
                        option.textContent = role;
                        option.selected = true;
                        deleteRolesSelect.appendChild(option);
                    });
                }
            });

            const deleteForm = document.getElementById('deleteForm');
            if (deleteForm) {
                deleteForm.addEventListener('submit', async (e) => {
                    e.preventDefault();

                    const id = document.getElementById('delete-id').value;

                    if (confirm('Are you sure you want to delete this user?')) {
                        try {
                            await deleteUser(id);
                            const modal = bootstrap.Modal.getInstance(deleteModal);
                            modal.hide();
                        } catch (error) {
                            alert(`Failed to delete user: ${error.message}`);
                        }
                    }
                });
            }
        }
    });

    // Load users when page loads
    document.addEventListener('DOMContentLoaded', () => {
        loadUsers();
    });
</script>
</body>
</html>
