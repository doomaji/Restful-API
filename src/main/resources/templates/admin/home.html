
<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid">
    <div class="row">

        <div class="col-md-3 col-lg-2 p-0">
            <div th:replace="~{fragments/sidebar :: sidebar('admin')}"></div>
        </div>

        <div class="col-md-9 col-lg-10 p-4">
            <h1 class="mb-3">Admin panel</h1>

            <div id="messageBox"></div>

            <ul class="nav nav-tabs mb-3" id="adminTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active"
                            id="users-tab"
                            data-bs-toggle="tab"
                            data-bs-target="#usersTab"
                            type="button">
                        Users
                    </button>
                </li>

                <li class="nav-item" role="presentation">
                    <button class="nav-link"
                            id="newuser-tab"
                            data-bs-toggle="tab"
                            data-bs-target="#newUserTab"
                            type="button">
                        New User
                    </button>
                </li>
            </ul>

            <div class="tab-content" id="adminTabsContent">

                <div class="tab-pane fade show active" id="usersTab">

                    <table class="table table-striped table-bordered">
                        <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>First name</th>
                            <th>Last name</th>
                            <th>Email</th>
                            <th>Username</th>
                            <th>Roles</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody id="usersTableBody"></tbody>
                    </table>
                </div>

                <div class="tab-pane fade" id="newUserTab">
                    <div th:replace="~{fragments/user-form :: userForm(${user}, ${roles})}"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/editModal :: editModal}"></div>
<div th:replace="~{fragments/deleteModal :: deleteModal}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const API_BASE_URL = '/api/users';

    async function apiCall(url, method, data = null) {
        const options = {
            method: method,
            headers: {
                'Content-Type': 'application/json'
            }
        };

        if (data) {
            options.body = JSON.stringify(data);
        }

        const response = await fetch(url, options);

        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(errorText || `HTTP error! status: ${response.status}`);
        }

        if (method === 'DELETE' || response.status === 204) {
            return null;
        }

        return await response.json();
    }

    async function loadUsers() {
        try {
            const users = await apiCall(API_BASE_URL, 'GET');
            updateUserTable(users);
        } catch (error) {
            showError(`Failed to load users: ${error.message}`);
        }
    }

    function updateUserTable(users) {

        const tableBody = document.getElementById('usersTableBody');
        if (!tableBody) return;

        tableBody.innerHTML = '';

        users.forEach(user => {
            const row = tableBody.insertRow();

            row.insertCell(0).textContent = user.id;
            row.insertCell(1).textContent = user.firstName || '';
            row.insertCell(2).textContent = user.lastName || '';
            row.insertCell(3).textContent = user.email || '';
            row.insertCell(4).textContent = user.username || '';

            const rolesCell = row.insertCell(5);
            const rolesText = user.roles
                ? user.roles.map(role => role.name || role.authority || '').join(', ')
                : '';
            rolesCell.textContent = rolesText;

            const actionsCell = row.insertCell(6);

            const editBtn = document.createElement('button');
            editBtn.textContent = 'Edit';
            editBtn.className = 'btn btn-sm btn-primary me-2';
            editBtn.setAttribute('data-bs-toggle', 'modal');
            editBtn.setAttribute('data-bs-target', '#editModal');
            editBtn.setAttribute('data-id', user.id);
            editBtn.setAttribute('data-firstname', user.firstName || '');
            editBtn.setAttribute('data-lastname', user.lastName || '');
            editBtn.setAttribute('data-email', user.email || '');
            editBtn.setAttribute('data-username', user.username || '');

            const roleIds = user.roles ? user.roles.map(role => role.id).join(',') : '';
            editBtn.setAttribute('data-roles', roleIds);

            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = 'Delete';
            deleteBtn.className = 'btn btn-sm btn-danger';
            deleteBtn.setAttribute('data-bs-toggle', 'modal');
            deleteBtn.setAttribute('data-bs-target', '#deleteModal');
            deleteBtn.setAttribute('data-id', user.id);
            deleteBtn.setAttribute('data-firstname', user.firstName || '');
            deleteBtn.setAttribute('data-lastname', user.lastName || '');
            deleteBtn.setAttribute('data-email', user.email || '');
            deleteBtn.setAttribute('data-username', user.username || '');
            deleteBtn.setAttribute('data-roles', rolesText);

            actionsCell.appendChild(editBtn);
            actionsCell.appendChild(deleteBtn);
        });
    }

    async function createUser(userData) {
        try {
            const newUser = await apiCall(API_BASE_URL, 'POST', userData);
            showSuccess('User created successfully!');
            await loadUsers();
            return newUser;
        } catch (error) {
            showError(`Failed to create user: ${error.message}`);
            throw error;
        }
    }

    async function updateUser(id, userData) {
        try {
            const updatedUser = await apiCall(`${API_BASE_URL}/${id}`, 'PUT', userData);
            showSuccess('User updated successfully!');
            await loadUsers();
            return updatedUser;
        } catch (error) {
            showError(`Failed to update user: ${error.message}`);
            throw error;
        }
    }

    async function deleteUser(id) {
        try {
            await apiCall(`${API_BASE_URL}/${id}`, 'DELETE');
            showSuccess('User deleted successfully!');
            await loadUsers();
        } catch (error) {
            showError(`Failed to delete user: ${error.message}`);
            throw error;
        }
    }

    function showSuccess(message) {
        const messageBox = document.getElementById('messageBox');
        if (!messageBox) return;

        messageBox.innerHTML = `
            <div class="alert alert-success alert-dismissible fade show" role="alert">
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        `;
    }

    function showError(message) {
        const messageBox = document.getElementById('messageBox');
        if (!messageBox) return;

        messageBox.innerHTML = `
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        `;
    }

    function initCreateForm() {
        const userForm = document.getElementById('userForm');
        if (!userForm) return;

        userForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const firstName = document.getElementById('firstName')?.value.trim() || '';
            const lastName = document.getElementById('lastName')?.value.trim() || '';
            const email = document.getElementById('email')?.value.trim() || '';
            const username = document.getElementById('username')?.value.trim() || '';
            const password = document.getElementById('password')?.value || '';

            if (!firstName || !lastName || !email || !username || !password) {
                showError('All fields are required');
                return;
            }

            const selectedRoles = [];
            document.querySelectorAll('input[name="roleId"]:checked').forEach(checkbox => {
                selectedRoles.push(Number(checkbox.value));
            });

            if (selectedRoles.length === 0) {
                showError('Please select at least one role');
                return;
            }

            const userData = {
                firstName: firstName,
                lastName: lastName,
                email: email,
                username: username,
                password: password,
                roles: selectedRoles.map(id => ({ id: id }))
            };

            try {
                await createUser(userData);
                userForm.reset();

                const usersTabBtn = document.getElementById('users-tab');
                if (usersTabBtn) {
                    const tab = new bootstrap.Tab(usersTabBtn);
                    tab.show();
                }
            } catch (error) {
                console.error(error);
            }
        });
    }

    function initEditModal() {
        const editModal = document.getElementById('editModal');
        if (!editModal) return;

        editModal.addEventListener('show.bs.modal', (event) => {
            const button = event.relatedTarget;
            if (!button) return;

            document.getElementById('edit-id').value = button.getAttribute('data-id') || '';
            document.getElementById('edit-firstName').value = button.getAttribute('data-firstname') || '';
            document.getElementById('edit-lastName').value = button.getAttribute('data-lastname') || '';
            document.getElementById('edit-email').value = button.getAttribute('data-email') || '';
            document.getElementById('edit-username').value = button.getAttribute('data-username') || '';
            document.getElementById('edit-password').value = '';

            const editRolesSelect = document.getElementById('edit-roles');
            if (editRolesSelect) {
                Array.from(editRolesSelect.options).forEach(option => option.selected = false);

                const roleIds = button.getAttribute('data-roles') || '';
                const selectedRoleIds = roleIds.split(',')
                    .map(id => id.trim())
                    .filter(Boolean);

                selectedRoleIds.forEach(roleId => {
                    const option = Array.from(editRolesSelect.options)
                        .find(opt => opt.value === roleId);
                    if (option) {
                        option.selected = true;
                    }
                });
            }

            const errorDiv = document.getElementById('edit-roles-error');
            if (errorDiv) {
                errorDiv.textContent = '';
            }
        });

        const editForm = document.getElementById('editForm');
        if (!editForm) return;

        editForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const id = document.getElementById('edit-id')?.value;
            const editRolesSelect = document.getElementById('edit-roles');

            if (!editRolesSelect) {
                showError('Roles field not found');
                return;
            }

            const selectedOptions = Array.from(editRolesSelect.selectedOptions);
            if (selectedOptions.length === 0) {
                const errorDiv = document.getElementById('edit-roles-error');
                if (errorDiv) {
                    errorDiv.textContent = 'Please select at least one role';
                }
                return;
            }

            const userData = {
                firstName: document.getElementById('edit-firstName')?.value.trim() || '',
                lastName: document.getElementById('edit-lastName')?.value.trim() || '',
                email: document.getElementById('edit-email')?.value.trim() || '',
                username: document.getElementById('edit-username')?.value.trim() || '',
                roles: selectedOptions.map(opt => ({
                    id: Number(opt.value)
                }))
            };

            const password = document.getElementById('edit-password')?.value || '';
            if (password.trim() !== '') {
                userData.password = password;
            }

            try {
                await updateUser(id, userData);

                const modal = bootstrap.Modal.getInstance(editModal);
                if (modal) {
                    modal.hide();
                }
            } catch (error) {
                console.error(error);
            }
        });
    }

    function initDeleteModal() {
        const deleteModal = document.getElementById('deleteModal');
        if (!deleteModal) return;

        deleteModal.addEventListener('show.bs.modal', (event) => {
            const button = event.relatedTarget;
            if (!button) return;

            document.getElementById('delete-id').value = button.getAttribute('data-id') || '';
            document.getElementById('delete-firstName').value = button.getAttribute('data-firstname') || '';
            document.getElementById('delete-lastName').value = button.getAttribute('data-lastname') || '';
            document.getElementById('delete-email').value = button.getAttribute('data-email') || '';
            document.getElementById('delete-username').value = button.getAttribute('data-username') || '';

            const deleteRolesSelect = document.getElementById('delete-roles');
            if (deleteRolesSelect) {
                deleteRolesSelect.innerHTML = '';

                const rolesStr = button.getAttribute('data-roles') || '';
                const roles = rolesStr.split(',')
                    .map(role => role.trim())
                    .filter(Boolean);

                roles.forEach(role => {
                    const option = document.createElement('option');
                    option.textContent = role;
                    option.selected = true;
                    deleteRolesSelect.appendChild(option);
                });
            }
        });

        const deleteForm = document.getElementById('deleteForm');
        if (!deleteForm) return;

        deleteForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const id = document.getElementById('delete-id')?.value;

            try {
                await deleteUser(id);

                const modal = bootstrap.Modal.getInstance(deleteModal);
                if (modal) {
                    modal.hide();
                }
            } catch (error) {
                console.error(error);
            }
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        initCreateForm();
        initEditModal();
        initDeleteModal();
        loadUsers();
    });
</script>
</body>
</html>
