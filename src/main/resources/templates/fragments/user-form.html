<div th:fragment="userForm(user, roles)">

    <form id="userForm">


        <div class="mx-auto" style="max-width: 420px;">

            <div class="text-center fw-bold mb-1">First Name</div>
            <div class="mb-3">
                <input class="form-control form-control-sm"
                       id="firstName"
                       name="firstName"
                       required
                       minlength="2"
                       maxlength="50"
                       pattern="[A-Za-z\s-]+"
                       title="Только буквы и тире">
                <div class="invalid-feedback">От 2 до 50 символов, только буквы и тире</div>
            </div>

            <div class="text-center fw-bold mb-1">Last Name</div>
            <div class="mb-3">
                <input class="form-control form-control-sm"
                       id="lastName"
                       name="lastName"
                       required
                       minlength="2"
                       maxlength="50"
                       pattern="[A-Za-z\s-]+"
                       title="Только буквы и тире">
                <div class="invalid-feedback">От 2 до 50 символов, только буквы и тире</div>
            </div>

            <div class="text-center fw-bold mb-1">Email</div>
            <div class="mb-3">
                <input type="email"
                       class="form-control form-control-sm"
                       id="email"
                       name="email"
                       required>
                <div class="invalid-feedback">Неверный email</div>
            </div>

            <div class="text-center fw-bold mb-1">Username</div>
            <div class="mb-3">
                <input class="form-control form-control-sm"
                       id="username"
                       name="username"
                       required
                       minlength="2"
                       maxlength="50"
                       pattern="[A-Za-z\s-]+"
                       title="Только буквы и символы">
                <div class="invalid-feedback">От 2 до 50 символов, только буквы и тире</div>
            </div>

            <div class="text-center fw-bold mb-1">Password</div>
            <div class="mb-3">
                <input type="password"
                       class="form-control form-control-sm"
                       id="password"
                       name="password"
                       required>
                <div class="invalid-feedback">Пароль неверный</div>
            </div>

            <div class="text-center fw-bold mb-2">Roles</div>
            <div class="mb-3 text-center">
                <div th:each="r : ${roles}" class="form-check form-check-inline">
                    <input class="form-check-input"
                           type="checkbox"
                           name="roleId"
                           th:value="${r.id}"
                           th:id="'role_' + ${r.id}">
                    <label class="form-check-label"
                           th:for="'role_' + ${r.id}"
                           th:text="${r.name}"></label>
                </div>
            </div>

            <div class="text-center">
                <button class="btn btn-success px-4" type="submit">Create</button>
            </div>

            <div id="formError" class="alert alert-danger mt-3" style="display: none;"></div>
            <div id="formSuccess" class="alert alert-success mt-3" style="display: none;"></div>
        </div>
    </form>
</div>
