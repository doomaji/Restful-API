<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="editModal">
    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">

                <form id="editForm" novalidate>

                    <input type="hidden" id="edit-id"/>

                    <div class="modal-header">
                        <h5 class="modal-title fw-bold">Edit user</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">

                        <div class="text-center fw-bold mb-1">
                            <label class="form-label fw-bold">First name</label>
                            <input class="form-control form-control-sm"
                                   id="edit-firstName"
                                   required
                                   minlength="2"
                                   maxlength="50"
                                   pattern="[A-Za-zА-Яа-я\s-]+"
                                   title="Только буквы и тире">
                            <div class="invalid-feedback">От 2 до 50 символов, только буквы и тире</div>
                        </div>

                        <div class="text-center fw-bold mb-1">
                            <label class="form-label fw-bold">Last name</label>
                            <input class="form-control form-control-sm"
                                   id="edit-lastName"
                                   required
                                   minlength="2"
                                   maxlength="50"
                                   pattern="[A-Za-zА-Яа-я\s-]+"
                                   title="Только буквы и тире">
                            <div class="invalid-feedback">От 2 до 50 символов, только буквы и тире</div>
                        </div>

                        <div class="text-center fw-bold mb-1">
                            <label class="form-label fw-bold">Email</label>
                            <input class="form-control form-control-sm"
                                   id="edit-email"
                                   type="email"
                                   required>
                            <div class="invalid-feedback">Неверный email</div>
                        </div>

                        <div class="text-center fw-bold mb-1">
                            <label class="form-label fw-bold">Username</label>
                            <input class="form-control form-control-sm"
                                   id="edit-username"
                                   required
                                   minlength="2"
                                   maxlength="50"
                                   pattern="[A-Za-zА-Яа-я0-9_\-]+"
                                   title="Только буквы, цифры, подчеркивание и тире">
                            <div class="invalid-feedback">От 2 до 50 символов, только буквы, цифры, подчеркивание и тире</div>
                        </div>

                        <div class="text-center fw-bold mb-1">
                            <label class="form-label fw-bold">Password</label>
                            <input class="form-control form-control-sm"
                                   type="password"
                                   id="edit-password"
                                   pattern="^(?=.*[A-Za-zА-Яа-я])(?=.*\d)[A-Za-zА-Яа-я\d]{6,}$"
                                   title="Минимум 6 символов, хотя бы одна буква и одна цифра">
                            <div class="invalid-feedback">Пароль должен содержать минимум 6 символов, хотя бы одну букву и одну цифру</div>
                            <small class="text-muted">Оставьте пустым, чтобы сохранить текущий пароль</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Roles</label>
                            <select class="form-select form-select-sm"
                                    id="edit-roles"
                                    multiple
                                    size="2"
                                    required>
                                <option th:each="role : ${roles}"
                                        th:value="${role.id}"
                                        th:text="${role.name.replace('ROLE_','')}">
                                </option>
                            </select>
                            <div id="edit-roles-error" class="text-danger" style="font-size: 0.875em;"></div>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save</button>
                    </div>

                </form>

            </div>
        </div>
    </div>
</div>

</body>
</html>
